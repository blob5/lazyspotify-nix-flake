name: Update Homebrew Tap

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish from"
        required: false
        type: string
      tap_repository:
        description: "Tap repository"
        required: true
        default: "dubeyKartikay/homebrew-lazyspotify"
        type: string
      tap_branch:
        description: "Tap branch"
        required: true
        default: "main"
        type: string

jobs:
  update:
    runs-on: macos-14

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create bundled source archive
        run: scripts/release/create-source-bundle.sh --output-dir dist --allow-untagged-daemon

      - name: Render formula
        run: |
          scripts/release/render-homebrew-formula.sh \
            --source-bundle "dist/lazyspotify-v$(awk -F': ' '$1==\"lazyspotify_version\" {gsub(/\"/, \"\", $2); gsub(/^v/, \"\", $2); print $2}' packaging/release-manifest.yaml)-src.tar.gz" \
            --output rendered/lazyspotify.rb

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.tap_repository }}
          token: ${{ secrets.HOMEBREW_TAP_REPO_TOKEN }}
          ref: ${{ inputs.tap_branch }}
          path: tap-repo

      - name: Update formula
        run: |
          mkdir -p tap-repo/Formula
          cp rendered/lazyspotify.rb tap-repo/Formula/lazyspotify.rb
          cd tap-repo
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lazyspotify.rb
          git commit -m "lazyspotify: update formula"
          git push origin HEAD:${{ inputs.tap_branch }}
